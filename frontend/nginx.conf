server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    location /api {
        proxy_pass https://rightfit-hr-agent-production.up.railway.app;
        proxy_http_version 1.1;
        proxy_set_header Host rightfit-hr-agent-production.up.railway.app;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 300s;
    }
}
